<div *ngIf="!showVerificationStep">
<form #registerForm="ngForm" (ngSubmit)="register()" autocomplete="off">
    <h2 class="text-center text-primary"> Sign up </h2>
    <hr>
    <div class="row">
        <div class="col-md-6 mb-3">
            <input type="email"
             class="form-control"
             name="email"
             [(ngModel)]="model.email"
             placeholder="Email"
             required>
        </div>
        <div class="col-md-6 mb-3">
            <input type="text"
             class="form-control"
             name="username"
             [(ngModel)]="model.username"
             placeholder="Username (optional)">
        </div>
    </div>
    <div class="mb-3">
        <input type="password"
         class="form-control"
         name="password"
         [(ngModel)]="model.password"
         placeholder="Password (min 8 characters)"
         required>
    </div>
    <div class="row">
        <div class="col-md-6 mb-3">
            <input type="text"
             class="form-control"
             name="familyName"
             [(ngModel)]="model.familyName"
             placeholder="Last Name"
             required>
        </div>
        <div class="col-md-6 mb-3">
            <input type="date"
             class="form-control"
             name="birthdate"
             [(ngModel)]="model.birthdate"
             placeholder="Birthdate"
             required>
        </div>
    </div>
    <div class="row">
        <div class="col-md-6 mb-3">
            <select class="form-control"
             name="gender"
             [(ngModel)]="model.gender"
             required>
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <div class="col-md-6 mb-3">
            <input type="tel"
             class="form-control"
             name="phoneNumber"
             [(ngModel)]="model.phoneNumber"
             placeholder="Phone Number (e.g., +447123456789)"
             required>
        </div>
    </div>
    <div class="mb-3">
        <input type="text"
         class="form-control"
         name="address"
         [(ngModel)]="model.address"
         placeholder="Address"
         required>
    </div>
    <div class="mb-3">
        <select class="form-control"
         name="timezone"
         [(ngModel)]="model.timezone"
         required>
            <option value="">Select Timezone</option>
            <option value="Europe/London">Europe/London (GMT/BST)</option>
            <option value="Europe/Paris">Europe/Paris (CET/CEST)</option>
            <option value="America/New_York">America/New_York (EST/EDT)</option>
            <option value="America/Los_Angeles">America/Los_Angeles (PST/PDT)</option>
            <option value="Asia/Tokyo">Asia/Tokyo (JST)</option>
        </select>
    </div>
    <div class="text-center">
        <button class="btn btn-success me-2" type="submit" [disabled]="!registerForm.valid"> Register </button>
        <button class="btn btn-default" type="button" (click)="cancel()"> Cancel </button>
    </div>
</form>
</div>

<div *ngIf="showVerificationStep">
    <form #verifyForm="ngForm" (ngSubmit)="verifyCode()" autocomplete="off">
        <h2 class="text-center text-primary"> Verify Email </h2>
        <hr>
        <p class="text-center">Please enter the verification code sent to your email.</p>
        <div class="mb-3">
            <input type="text"
             class="form-control text-center"
             name="verificationCode"
             [(ngModel)]="model.verificationCode"
             placeholder="Enter 6-digit code"
             maxlength="6"
             required>
        </div>
        <div class="text-center">
            <button class="btn btn-success me-2" type="submit" [disabled]="!verifyForm.valid"> Verify </button>
            <button class="btn btn-info me-2" type="button" (click)="resendCode()"> Resend Code </button>
            <button class="btn btn-default" type="button" (click)="cancel()"> Cancel </button>
        </div>
    </form>
</div>
