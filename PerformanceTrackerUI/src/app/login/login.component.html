<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1 class="app-title">Climbing Tracker</h1>
      <p class="app-subtitle">Track your climbing progress and performance</p>
    </div>

    <div *ngIf="!showRegister" class="login-form-container">
      <h2 class="form-title">Sign In</h2>
      <form #loginForm="ngForm" (ngSubmit)="login()" autocomplete="off">
        <div class="form-group">
          <label for="username">Username or Email</label>
          <input
            type="text"
            id="username"
            class="form-control"
            name="username"
            [(ngModel)]="model.username"
            placeholder="Enter your username or email"
            required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            class="form-control"
            name="password"
            [(ngModel)]="model.password"
            placeholder="Enter your password"
            required>
        </div>
        <button
          type="submit"
          class="btn btn-primary btn-block"
          [disabled]="!loginForm.valid">
          Sign In
        </button>
      </form>
      <div class="divider">
        <span>OR</span>
      </div>
      <button
        type="button"
        class="btn btn-outline-primary btn-block"
        (click)="toggleRegister()">
        Create New Account
      </button>
    </div>

    <div *ngIf="showRegister" class="register-form-container">
      <app-register (cancelRegister)="cancelRegister($event)"></app-register>
      <div class="back-to-login">
        <button
          type="button"
          class="btn btn-link"
          (click)="toggleRegister()">
          Already have an account? Sign in
        </button>
      </div>
    </div>
  </div>
</div>
